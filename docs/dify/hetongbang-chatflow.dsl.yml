      - id: review_quality_gate
        type: custom
        position:
          x: 3000
          y: 160
        data:
          title: 审查 JSON 质量门
          type: code
          desc: "清理模型输出，统一五档评分字段，保证返回前端可解析 JSON。"
          selected: false
          code_language: python3
          code: |
            import json
            import re

            def clean_text(text):
                cleaned = re.sub(r"(?is)<think>.*?</think>\s*", "", text or "").strip()
                fence = re.match(r"(?is)^```(?:json)?\s*(.*?)\s*```$", cleaned)
                if fence:
                    cleaned = fence.group(1).strip()
                start = cleaned.find("{")
                end = cleaned.rfind("}")
                if start >= 0 and end > start:
                    cleaned = cleaned[start:end + 1].strip()
                return cleaned

            def grade_from_score(score):
                try:
                    score = int(round(float(score)))
                except Exception:
                    score = 0
                score = max(0, min(100, score))
                if score >= 90:
                    return score, "A", "低风险，基本可直接使用或签署前做常规确认"
                if score >= 80:
                    return score, "B", "较低风险，整体可用，但建议优化若干条款"
                if score >= 70:
                    return score, "C", "中等风险，风险可控，但关键条款应修改后再使用"
                if score >= 60:
                    return score, "D", "较高风险，不建议直接签署或发送，应系统修订"
                return score, "E", "重大风险、信息严重不足或风险不可控"

            def main(text: str) -> dict:
                cleaned = clean_text(text)
                try:
                    data = json.loads(cleaned)
                except Exception:
                    data = {
                        "intent": "review",
                        "status": "need_input",
                        "result_type": "review_report",
                        "title": "审查结果解析失败",
                        "summary": "模型输出不是有效 JSON，请重新运行审查。",
                        "score": 0,
                        "grade": "E",
                        "markdown_report": cleaned[:4000],
                    }

                if not isinstance(data, dict):
                    data = {
                        "intent": "review",
                        "status": "need_input",
                        "result_type": "review_report",
                        "title": "审查结果解析失败",
                        "summary": "模型输出不是 JSON 对象，请重新运行审查。",
                        "score": 0,
                        "grade": "E",
                        "markdown_report": cleaned[:4000],
                    }

                data["intent"] = "review"
                data.setdefault("result_type", "review_report")
                data.setdefault("status", "complete")
                data.setdefault("title", "合同审查报告")
                score, grade, label = grade_from_score(data.get("score", data.get("risk_score", 0)))
                if data.get("status") == "need_input":
                    score, grade, label = 0, "E", "信息严重不足，暂不能完成可靠审查"
                data["score"] = score
                data["grade"] = grade
                data["grade_label"] = label
                data.setdefault("risk_level", "unknown" if data.get("status") == "need_input" else "medium")
                info = data.get("information_completeness")
                if not isinstance(info, dict):
                    info = {}
                    data["information_completeness"] = info
                missing_fields = info.get("missing_fields", [])
                if not isinstance(missing_fields, list):
                    missing_fields = [str(missing_fields)] if missing_fields else []
                    info["missing_fields"] = missing_fields
                data.setdefault("missing_fields", missing_fields)
                data.setdefault("followup_questions", [])
                data.setdefault("key_findings", [])
                data.setdefault("clause_reviews", [])
                data.setdefault("suggested_revisions", [])
                data.setdefault("signature_checklist", [])
                data.setdefault("legal_references", [{
                    "title": "法规知识库未连接",
                    "source_type": "knowledge_base",
                    "verification_status": "not_connected",
                    "note": "后续接入法规知识库后再返回可核验引用。"
                }])
                data.setdefault("disclaimer", "AI 辅助审查，不构成律师法律意见；重要合同请交由专业律师复核。")
                data.setdefault("markdown_report", data.get("summary", ""))
                return {"text": json.dumps(data, ensure_ascii=False)}
          outputs:
            text:
              type: string
          variables:
            - variable: text
              value_selector:
                - review_llm
                - text
