      - id: consult_quality_gate
        type: custom
        position:
          x: 3000
          y: 980
        data:
          title: 咨询 JSON 质量门
          type: code
          desc: "清理咨询分支模型输出，保证返回前端可解析 JSON。"
          selected: false
          code_language: python3
          code: |
            import json
            import re

            def clean_text(text):
                cleaned = re.sub(r"(?is)<think>.*?</think>\s*", "", text or "").strip()
                fence = re.match(r"(?is)^```(?:json)?\s*(.*?)\s*```$", cleaned)
                if fence:
                    cleaned = fence.group(1).strip()
                start = cleaned.find("{")
                end = cleaned.rfind("}")
                if start >= 0 and end > start:
                    cleaned = cleaned[start:end + 1].strip()
                return cleaned

            def main(text: str) -> dict:
                cleaned = clean_text(text)
                try:
                    data = json.loads(cleaned)
                except Exception:
                    data = {
                        "intent": "consult",
                        "status": "complete",
                        "result_type": "contract_consultation",
                        "title": "合同咨询",
                        "topic": "合同问题咨询",
                        "summary": "模型输出不是标准 JSON，已保留原始回答摘要。",
                        "answer_markdown": cleaned[:4000],
                    }

                if not isinstance(data, dict):
                    data = {
                        "intent": "consult",
                        "status": "complete",
                        "result_type": "contract_consultation",
                        "title": "合同咨询",
                        "topic": "合同问题咨询",
                        "summary": "模型输出不是 JSON 对象，已保留原始回答摘要。",
                        "answer_markdown": cleaned[:4000],
                    }

                data["intent"] = "consult"
                data.setdefault("status", "complete")
                data.setdefault("result_type", "contract_consultation")
                data.setdefault("title", "合同咨询")
                data.setdefault("topic", data.get("title", "合同问题咨询"))
                data.setdefault("contract_type", "")
                data.setdefault("role", "")
                data.setdefault("summary", "")
                data.setdefault("answer_markdown", data.get("summary", ""))
                data.setdefault("key_points", [])
                data.setdefault("practical_tips", [])
                data.setdefault("risk_notes", [])
                data.setdefault("recommended_mode", "consult")
                data.setdefault("followup_questions", [])
                data.setdefault("suggested_actions", [])
                data.setdefault("legal_references", [{
                    "title": "法规知识库未连接",
                    "source_type": "knowledge_base",
                    "verification_status": "not_connected",
                    "note": "后续接入法规知识库后再返回可核验引用。"
                }])
                data.setdefault("disclaimer", "AI 辅助说明不构成律师法律意见；重要合同请交由专业律师复核。")
                return {"text": json.dumps(data, ensure_ascii=False)}
          outputs:
            text:
              type: string
          variables:
            - variable: text
              value_selector:
                - consult_llm
                - text
